<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#indigo-grad)" />
  
  <!-- Outer radar ring glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#818cf8" stroke-width="4" stroke-opacity="0.5" stroke-dasharray="10, 10" />
  
  <!-- Middle radar ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.8" />
  
  <!-- Inner radar circle -->
  <circle cx="256" cy="256" r="70" fill="url(#glow)" />
  <circle cx="256" cy="256" r="70" fill="none" stroke="#ffffff" stroke-width="12" />
  
  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="380" y2="132" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <circle cx="380" cy="132" r="16" fill="#facc15" /> <!-- Yellow target pin representing active reading -->

  <!-- Centered Target dot -->
  <circle cx="256" cy="256" r="20" fill="#ffffff" />
</svg>
